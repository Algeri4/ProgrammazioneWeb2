{% extends 'telefoni/base.html' %}

{% block content %}
<div class="card card-custom">
    <div class="card-header bg-white">
        <h3><i class="fa-solid fa-pen-to-square"></i> Modifica Telefonata</h3>
    </div>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Numero di telefono</label>
                <input type="text" class="form-control" value="{{ telefonata.effettuatada.numero }}" disabled>
            </div>

            <div class="mb-3">
                <label class="form-label">Intestatario</label>
                <input type="text" class="form-control" value="{{ telefonata.effettuatada.nominativo|default:'-' }}" disabled>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Data</label>
                    <input type="date" name="data" class="form-control" value="{{ telefonata.data|date:'Y-m-d' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Ora</label>
                    <input type="time" name="ora" class="form-control" value="{{ telefonata.ora|time:'H:i' }}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Durata (minuti)</label>
                    <input type="number" name="durata" class="form-control" value="{{ telefonata.durata }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Costo (€) - solo per ricarica</label>
                    <input type="number" name="costo" class="form-control" step="0.01" value="{{ telefonata.costo|floatformat:2 }}">
                </div>
            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-salmon">Salva modifiche</button>
                <a href="/telefonate/cerca/" class="btn btn-secondary">Annulla</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
